services:
  postgres:
    image: postgres:15
    container_name: energy_lakehouse_db
    environment:
      POSTGRES_USER: lakehouse
      POSTGRES_PASSWORD: lakehouse123
      POSTGRES_DB: energy_lakehouse
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lakehouse -d energy_lakehouse"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
