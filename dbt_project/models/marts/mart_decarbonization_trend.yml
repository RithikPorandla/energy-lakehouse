version: 2

models:
  - name: mart_decarbonization_trend
    description: >
      Headline insight mart. One row per state per year: clean-energy capacity
      share (EIA) alongside real facility GHG emissions totals (EPA), with
      year-over-year deltas and a flag for years where clean capacity grew
      meaningfully without a matching emissions decline.
    columns:
      - name: state_code
        tests:
          - not_null
      - name: year
        tests:
          - not_null
      - name: clean_capacity_share
        description: "Share of total nameplate capacity that is solar/wind/hydro/nuclear"
      - name: total_ghg_emissions_metric_tons
        description: "Total reported GHGRP facility emissions for the state/year, in metric tons CO2e"
        tests:
          - not_null
      - name: total_generation_mwh
        description: "Actual net electricity generation (EIA-923), in megawatt-hours"
      - name: capacity_factor
        description: "total_generation_mwh / (total_capacity_mw x hours_in_year) — how much of theoretical max output actually ran"
      - name: clean_capacity_factor
        description: "Same as capacity_factor, restricted to clean (solar/wind/hydro/nuclear) capacity and generation"
      - name: capacity_emissions_divergence_flag
        description: "True when clean capacity grew >3% YoY but emissions didn't fall by at least 1%"
